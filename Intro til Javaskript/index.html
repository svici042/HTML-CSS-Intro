<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Intro til Javascript</title>
</head>
<body>
    <header>
        <h1>Intro til JavaScript</h1>
    </header>
    <main>
        <section class="intro">
            <h2>Velkommen!</h2>
            <p>Dette er en introduksjon til JavaScript med en handleliste.</p>
        </section>
        <section class="shopping">
            <h2>Handleliste</h2>
            <ul id="shopping-list"></ul>
        </section>
        <section class="todo-section">
            <h2>To Do Liste</h2>
            <div class="todo-input-group">
                <input type="text" id="todo-input" placeholder="Skriv en oppgave...">
                <button id="add-btn" class="multiply-btn">➕ Legg til</button>
            </div>
            <ul id="todo-list"></ul>
            <button id="multiply-tasks-btn" class="multiply-btn secondary">✨ Multipliser 3 oppgaver</button>
        </section>
    </main>
</body>
</html>
